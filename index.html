<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lettre aux Actionnaires — Groupe U19T3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap');

  :root {
    --navy: #1B3A5C;
    --navy-dark: #0F2640;
    --teal: #2A9D8F;
    --teal-light: #40B5A6;
    --teal-pale: #E8F5F3;
    --gold: #E9C46A;
    --coral: #E76F51;
    --light-bg: #F7F9FC;
    --card-bg: #FFFFFF;
    --text-dark: #1A1A2E;
    --text-mid: #4A5568;
    --text-light: #718096;
    --border: #E2E8F0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: #E8ECF1; color: var(--text-dark); -webkit-font-smoothing: antialiased; }
  .page { width: 210mm; min-height: 297mm; margin: 20px auto; background: white; position: relative; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.12); page-break-after: always; }
  @media print { body { background: white; } .page { margin: 0; box-shadow: none; page-break-after: always; } }
  
  /* COVER */
  .cover { height: 297mm; display: flex; flex-direction: column; background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 40%, #1E4D6B 100%); color: white; position: relative; }
  .cover::before { content: ''; position: absolute; top: -20%; right: -10%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(42,157,143,0.15) 0%, transparent 70%); border-radius: 50%; }
  .cover::after { content: ''; position: absolute; bottom: -10%; left: -5%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(233,196,106,0.08) 0%, transparent 70%); border-radius: 50%; }
  .cover-top-bar { height: 6px; background: linear-gradient(90deg, var(--teal), var(--gold), var(--teal)); }
  .cover-content { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 60px 55px; position: relative; z-index: 1; }
  .cover-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(42,157,143,0.2); border: 1px solid rgba(42,157,143,0.4); border-radius: 30px; padding: 8px 20px; font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--teal-light); width: fit-content; margin-bottom: 40px; }
  .cover-badge::before { content: ''; width: 8px; height: 8px; background: var(--teal); border-radius: 50%; }
  .cover-title { font-family: 'Playfair Display', serif; font-size: 52px; font-weight: 800; line-height: 1.1; margin-bottom: 8px; }
  .cover-title span { display: block; background: linear-gradient(90deg, #fff, rgba(255,255,255,0.8)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .cover-subtitle { font-size: 20px; font-weight: 300; color: rgba(255,255,255,0.7); margin-bottom: 50px; letter-spacing: 0.5px; }
  .cover-line { width: 80px; height: 3px; background: var(--teal); margin-bottom: 50px; border-radius: 2px; }
  
  /* TOC */
  .toc { display: flex; flex-direction: column; gap: 12px; margin-bottom: 50px; }
  .toc-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 18px; background: rgba(255,255,255,0.05); border-radius: 10px; border-left: 3px solid var(--teal); transition: background 0.2s; }
  .toc-item:hover { background: rgba(255,255,255,0.1); }
  .toc-item-title { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.85); }
  .toc-item-page { font-size: 12px; font-weight: 700; color: var(--teal-light); min-width: 30px; text-align: right; }
  
  .cover-kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 50px; }
  .cover-kpi { background: rgba(255,255,255,0.06); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px; }
  .cover-kpi-value { font-size: 36px; font-weight: 800; color: var(--teal-light); margin-bottom: 4px; }
  .cover-kpi-label { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
  .cover-kpi-detail { font-size: 11px; color: rgba(255,255,255,0.4); }
  .cover-footer { padding: 30px 55px; border-top: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 1; }
  .cover-footer-left { font-size: 12px; color: rgba(255,255,255,0.5); }
  .cover-footer-right { font-size: 11px; color: rgba(255,255,255,0.4); text-align: right; }
  .cover-group { font-size: 16px; font-weight: 700; color: white; letter-spacing: 3px; }
  
  /* PAGE HEADER */
  .page-header { background: var(--navy); padding: 12px 50px; display: flex; justify-content: space-between; align-items: center; }
  .page-header-left { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.6); letter-spacing: 2px; text-transform: uppercase; }
  .page-header-right { font-size: 10px; color: rgba(255,255,255,0.4); }
  .accent-bar { height: 4px; background: linear-gradient(90deg, var(--teal), var(--gold)); }
  .page-body { padding: 40px 50px; }
  .section-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--teal); margin-bottom: 12px; }
  .section-tag::before { content: ''; width: 20px; height: 2px; background: var(--teal); }
  .section-title { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 800; color: var(--navy); margin-bottom: 6px; line-height: 1.15; }
  .section-subtitle { font-size: 13px; color: var(--text-light); margin-bottom: 30px; }
  .divider-thin { height: 1px; background: var(--border); margin: 24px 0; }
  .text-body { font-size: 12.5px; line-height: 1.75; color: var(--text-mid); margin-bottom: 16px; text-align: justify; }
  .text-body strong { color: var(--text-dark); font-weight: 600; }
  .greeting { font-size: 14px; font-weight: 600; color: var(--navy); margin-bottom: 16px; }
  
  /* KPI */
  .kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin: 28px 0; }
  .kpi-card { background: var(--light-bg); border-radius: 12px; padding: 20px; border-left: 4px solid var(--teal); }
  .kpi-card-value { font-size: 28px; font-weight: 800; color: var(--navy); }
  .kpi-card-label { font-size: 11px; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .kpi-card-sub { font-size: 10px; color: var(--teal); margin-top: 2px; font-weight: 500; }
  
  .signature { margin-top: 24px; padding-top: 16px; border-top: 2px solid var(--navy); display: inline-block; }
  .signature-name { font-size: 13px; font-weight: 700; color: var(--navy); }
  .signature-role { font-size: 11px; color: var(--text-light); }
  
  .page-footer { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 50px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); background: white; }
  .page-footer-text { font-size: 9px; color: var(--text-light); letter-spacing: 0.5px; }
  .page-number { width: 28px; height: 28px; border-radius: 50%; background: var(--navy); color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
  
  /* SUBSECTIONS */
  .subsection-title { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
  .subsection-title .num { width: 28px; height: 28px; border-radius: 8px; background: var(--teal); color: white; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; flex-shrink: 0; }
  
  /* TABLES */
  .data-table { width: 100%; border-collapse: collapse; font-size: 10.5px; margin: 12px 0; }
  .data-table thead th { background: var(--navy); color: white; padding: 10px 8px; font-weight: 600; text-align: center; font-size: 10px; letter-spacing: 0.3px; }
  .data-table thead th:first-child { text-align: left; border-radius: 8px 0 0 0; padding-left: 14px; }
  .data-table thead th:last-child { border-radius: 0 8px 0 0; }
  .data-table tbody td { padding: 9px 8px; text-align: center; border-bottom: 1px solid #EDF2F7; color: var(--text-mid); }
  .data-table tbody td:first-child { text-align: left; font-weight: 600; color: var(--text-dark); padding-left: 14px; }
  .data-table tbody tr:hover { background: var(--teal-pale); }
  .data-table tbody tr:last-child td { border-bottom: 2px solid var(--teal); }
  .data-table .highlight-cell { color: var(--teal); font-weight: 700; }
  .data-table .accent-row td { background: #F0FAF9; font-weight: 600; color: var(--navy); }
  
  /* INSIGHT */
  .insight-box { background: linear-gradient(135deg, #F0FAF9, #E8F4FD); border-left: 4px solid var(--teal); border-radius: 0 12px 12px 0; padding: 16px 18px; margin: 16px 0; }
  .insight-box p { font-size: 11px; line-height: 1.6; color: var(--text-mid); }
  .insight-box .insight-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--teal); margin-bottom: 6px; }
  
  /* FLOW */
  .flow-diagram { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 20px 0; padding: 20px; background: var(--light-bg); border-radius: 16px; }
  .flow-node { text-align: center; padding: 14px 16px; border-radius: 12px; min-width: 90px; }
  .flow-node-primary { background: var(--navy); color: white; }
  .flow-node-secondary { background: var(--teal); color: white; }
  .flow-node-tertiary { background: white; border: 2px solid var(--navy); color: var(--navy); }
  .flow-node-icon { font-size: 22px; margin-bottom: 4px; }
  .flow-node-text { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .flow-node-sub { font-size: 9px; opacity: 0.7; margin-top: 2px; }
  .flow-arrow { font-size: 20px; color: var(--teal); font-weight: 300; }
  
  /* CARDS */
  .perspective-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin: 20px 0; }
  .perspective-card { border-radius: 14px; padding: 22px 18px; position: relative; overflow: hidden; }
  .perspective-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; }
  .perspective-card.card-1 { background: #F0F7FF; }
  .perspective-card.card-1::before { background: var(--navy); }
  .perspective-card.card-2 { background: #F0FAF9; }
  .perspective-card.card-2::before { background: var(--teal); }
  .perspective-card.card-3 { background: #FFFBEB; }
  .perspective-card.card-3::before { background: var(--gold); }
  .perspective-card-icon { font-size: 28px; margin-bottom: 10px; }
  .perspective-card-title { font-size: 12px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
  .perspective-card-text { font-size: 10.5px; line-height: 1.55; color: var(--text-mid); }
  
  /* QUOTE */
  .quote-callout { background: var(--navy); color: white; border-radius: 16px; padding: 28px 30px; margin: 24px 0; position: relative; }
  .quote-callout::before { content: '\201C'; font-family: 'Playfair Display', serif; font-size: 80px; position: absolute; top: -5px; left: 20px; color: rgba(42,157,143,0.3); line-height: 1; }
  .quote-callout p { font-size: 14px; font-weight: 500; line-height: 1.7; font-style: italic; position: relative; z-index: 1; padding-left: 10px; }
  .quote-callout .quote-author { font-size: 11px; font-style: normal; color: var(--teal-light); margin-top: 12px; font-weight: 600; }
  
  /* METRICS */
  .metric-pills { display: flex; gap: 10px; flex-wrap: wrap; margin: 14px 0; }
  .metric-pill { background: var(--light-bg); border-radius: 20px; padding: 8px 16px; display: flex; align-items: center; gap: 8px; }
  .metric-pill-icon { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }
  .metric-pill-icon.green { background: #D1FAE5; }
  .metric-pill-icon.blue { background: #DBEAFE; }
  .metric-pill-icon.amber { background: #FEF3C7; }
  .metric-pill-text { font-size: 10.5px; font-weight: 600; color: var(--text-dark); }
  .metric-pill-sub { font-size: 9px; color: var(--text-light); }
  
  /* PREVISIONS */
  .prevision-box { background: linear-gradient(135deg, var(--navy-dark), var(--navy)); border-radius: 16px; padding: 24px 28px; margin: 16px 0; color: white; text-align: center; }
  .prevision-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--teal-light); margin-bottom: 8px; }
  .prevision-value { font-size: 28px; font-weight: 800; color: white; margin-bottom: 4px; }
  .prevision-arrow { color: var(--teal-light); font-size: 20px; margin: 0 8px; }
  .prevision-detail { font-size: 11px; color: rgba(255,255,255,0.6); }
  
  /* DELIVERY */
  .delivery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin: 16px 0; }
  .delivery-card { background: var(--light-bg); border-radius: 12px; padding: 18px; border-top: 4px solid var(--navy); }
  .delivery-card.card-teal { border-top-color: var(--teal); }
  .delivery-card.card-gold { border-top-color: var(--gold); }
  .delivery-card-title { font-size: 12px; font-weight: 700; color: var(--navy); margin-bottom: 10px; }
  .delivery-sub { font-size: 10px; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .delivery-list { font-size: 10.5px; color: var(--text-mid); line-height: 1.6; }
  
  /* TECH */
  .tech-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin: 16px 0; }
  .tech-card { background: var(--light-bg); border-radius: 14px; padding: 20px 16px; text-align: center; border-bottom: 3px solid var(--navy); }
  .tech-card.t-teal { border-bottom-color: var(--teal); }
  .tech-card.t-gold { border-bottom-color: var(--gold); }
  .tech-card-icon { font-size: 32px; margin-bottom: 8px; }
  .tech-card-title { font-size: 13px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
  .tech-card-text { font-size: 10.5px; color: var(--text-mid); line-height: 1.5; }
  
  /* RSE */
  .rse-pillars { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin: 16px 0; }
  .rse-pillar { border-radius: 14px; padding: 20px; position: relative; overflow: hidden; }
  .rse-pillar::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; }
  .rse-pillar.env { background: #F0FAF9; }
  .rse-pillar.env::before { background: var(--teal); }
  .rse-pillar.social { background: #F0F7FF; }
  .rse-pillar.social::before { background: var(--navy); }
  .rse-pillar.data { background: #FFFBEB; }
  .rse-pillar.data::before { background: var(--gold); }
  .rse-pillar.quality { background: #FFF1F0; }
  .rse-pillar.quality::before { background: var(--coral); }
  .rse-pillar-icon { font-size: 24px; margin-bottom: 8px; }
  .rse-pillar-title { font-size: 12px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
  .rse-pillar-text { font-size: 10.5px; line-height: 1.55; color: var(--text-mid); }
  
  /* STAT */
  .stat-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin: 16px 0; }
  .stat-box { background: var(--light-bg); border-radius: 12px; padding: 18px; border-left: 4px solid var(--teal); }
  .stat-box.gold-border { border-left-color: var(--gold); }
  .stat-box.navy-border { border-left-color: var(--navy); }
  .stat-box-value { font-size: 22px; font-weight: 800; color: var(--navy); margin-bottom: 2px; }
  .stat-box-label { font-size: 10px; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-box-sub { font-size: 10px; color: var(--teal); margin-top: 2px; font-weight: 500; }
  
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
</style>
</head>
<body>
